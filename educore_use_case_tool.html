<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCore Use Case Tool - Hierarchy Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow-x: hidden; width: 100%; }
        textarea, input[type="text"], input[type="password"], select { 
            width: 100% !important; box-sizing: border-box !important; display: block !important;
            border: 1px solid #cbd5e1 !important; border-radius: 0.375rem !important;
            padding: 0.75rem !important; font-size: 0.875rem !important; background-color: #ffffff !important;
        }
        .section-container { margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid #e2e8f0; width: 100%; }
        .section-label { display: block; font-size: 0.875rem; font-weight: 900; color: #334155; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; text-align: left; }
        .widget-table { width: 100%; border-collapse: collapse; border: 1px solid #94a3b8; margin-bottom: 1rem; }
        .widget-table th { background-color: #f1f5f9; border: 1px solid #94a3b8; padding: 0.5rem; font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; text-align: left; }
        .widget-table td { border: 1px solid #94a3b8; padding: 0.25rem; background-color: #ffffff; }
        .ghost-input { border: none !important; background: transparent !important; width: 100% !important; font-weight: 700 !important; padding: 0.25rem !important; }
        .control-btn { padding: 0.25rem 0.5rem; font-size: 0.75rem; font-weight: 700; border-radius: 0.25rem; cursor: pointer; border: none; background: none; }
        #preview-content table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; }
        #preview-content th, #preview-content td { border: 1px solid #000; padding: 0.5rem; text-align: left; }
        #preview-content table:not(.swimlane-table) tr:nth-child(even) { background-color: #f9f9f9; }
        .swimlane-table td:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div class="w-full bg-white shadow-2xl min-h-screen flex flex-col">
        <header class="bg-slate-900 text-white sticky top-0 z-50 shadow-lg w-full">
            <div class="max-w-full px-4 md:px-8 py-4 flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-4">
                    <h1 class="text-xl font-black italic text-blue-400 tracking-tighter">EDUCORE</h1>
                    <div id="saveStatus" class="text-[9px] bg-slate-800 px-3 py-1 rounded-full text-slate-400 uppercase font-mono">Ready</div>
                </div>
                <div class="flex flex-wrap items-center gap-2">
                    <input type="password" id="ghToken" placeholder="GitHub PAT" style="width: 140px !important; padding: 6px !important; font-size: 10px !important; background: #1e293b !important; color: white !important; border: none !important;">
                    <select id="issueSelector" onchange="handleSelectionChange()" style="width: 240px !important; padding: 6px !important; font-size: 10px !important; background: #1e293b !important; color: white !important; border: none !important;">
                        <option value="new">-- Create New Use Case --</option>
                    </select>
                    <button onclick="handlePublishClick()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-[10px] font-black uppercase">Publish / Update</button>
                </div>
            </div>
        </header>

        <nav class="flex border-b bg-white sticky top-[64px] z-40 w-full">
            <button onclick="switchTab('edit')" id="tab-edit" class="flex-1 py-4 text-xs font-black border-b-4 border-blue-600 text-blue-600 uppercase tracking-widest">1. Edit Mode</button>
            <button onclick="switchTab('preview')" id="tab-preview" class="flex-1 py-4 text-xs font-black border-b-4 border-transparent text-slate-400 uppercase tracking-widest">2. Preview Mode</button>
        </nav>

        <main id="view-edit" class="p-4 md:p-10 w-full box-border">
            <div id="formContainer" class="w-full space-y-6">
                <div class="section-container"><label class="section-label">0. Title</label><input type="text" id="uc_title" oninput="state.title=this.value; saveToLocal();"></div>
                <div class="section-container"><label class="section-label">1. Introduction</label><textarea id="uc_intro" rows="4"></textarea></div>
                <div class="section-container"><label class="section-label">2. Objectives</label><textarea id="uc_objectives" rows="4"></textarea></div>
                <div class="section-container"><label class="section-label">3. Scenario</label><textarea id="uc_scenario" rows="4"></textarea></div>
                <div class="section-container"><label class="section-label">4. Actors</label>
                    <table class="widget-table"><thead><tr><th width="30%">Actor</th><th>Role</th><th width="40"></th></tr></thead><tbody id="actorsTable"></tbody></table>
                    <button onclick="addActor()" class="text-[11px] font-black text-blue-600 uppercase">+ Add Actor</button>
                </div>
                <div class="section-container"><label class="section-label">5. Steps</label>
                    <table class="widget-table"><thead><tr><th width="50">#</th><th width="25%">Actor</th><th>Action</th><th width="120">Move</th></tr></thead><tbody id="stepsTable"></tbody></table>
                    <button onclick="addStep()" class="text-[11px] font-black text-blue-600 uppercase">+ Add Step</button>
                </div>
                <div class="section-container"><label class="section-label">6. Interaction Swimlane</label><p>The swimlane will be generated in Preview Mode.</p></div>
                <div class="section-container"><label class="section-label">7. Key Concepts</label>
                    <table class="widget-table"><tbody id="conceptsTable"></tbody></table>
                    <button onclick="addConcept()" class="text-[11px] font-black text-blue-600 uppercase">+ Add Concept</button>
                </div>
                <div class="section-container"><label class="section-label">8. Data Elements</label>
                    <table class="widget-table"><thead><tr><th>Name</th><th>Definition</th><th>URL</th><th width="40"></th></tr></thead><tbody id="dataTable"></tbody></table>
                    <button onclick="addDataElement()" class="text-[11px] font-black text-blue-600 uppercase">+ Add Data</button>
                </div>
                <div class="section-container"><label class="section-label">9. Dependencies</label>
                    <table class="widget-table"><tbody id="depsTable"></tbody></table>
                    <button onclick="addDep()" class="text-[11px] font-black text-blue-600 uppercase">+ Add Dependency</button>
                </div>
                <div class="section-container"><label class="section-label">10. Outcomes</label>
                    <table class="widget-table"><tbody id="outcomesTable"></tbody></table>
                    <button onclick="addOutcome()" class="text-[11px] font-black text-blue-600 uppercase">+ Add Outcome</button>
                </div>
                <div class="section-container"><label class="section-label">11. References</label>
                    <table class="widget-table"><thead><tr><th>Title</th><th>URL</th><th width="40"></th></tr></thead><tbody id="refsTable"></tbody></table>
                    <button onclick="addReference()" class="text-[11px] font-black text-blue-600 uppercase">+ Add Ref</button>
                </div>
            </div>
        </main>

        <div id="view-preview" class="hidden p-4 md:p-10 bg-slate-100 min-h-screen">
            <div class="w-full max-w-6xl mx-auto bg-white p-8 md:p-16 shadow-2xl border border-black" id="preview-content"></div>
        </div>
    </div>

    <script>
        const REPO = "INFERable-app/educate_use_cases";
        let state = { title: "", intro: "", objectives: "", scenario: "", actors: [{name: "User", desc: ""}], steps: [{actorIdx: 0, action: ""}], concepts: [], dataElements: [], deps: [], outcomes: [], references: [] };
        let lastSyncedState = ""; 
        let currentIssueUrl = "new";

        window.onload = async () => {
            const savedToken = localStorage.getItem('educore_gh_token');
            if (savedToken) document.getElementById('ghToken').value = savedToken;
            
            loadFromLocal();
            await fetchIssues();
            
            document.getElementById('ghToken').addEventListener('blur', async (e) => {
                localStorage.setItem('educore_gh_token', e.target.value);
                await fetchIssues();
            });
            document.getElementById('formContainer').addEventListener('input', () => { 
                document.getElementById('saveStatus').innerText = "Unsaved Changes"; 
                updateStateFromDOM();
                saveToLocal();
            });
        };

        async function fetchIssues() {
            const token = document.getElementById('ghToken').value;
            // Removed token check to allow fetching public repo issues

            const [owner, name] = REPO.split('/');
            const query = `
            query {
              repository(owner: "${owner}", name: "${name}") {
                issues(first: 100, states: OPEN, orderBy: {field: CREATED_AT, direction: DESC}) {
                  nodes {
                    title
                    url
                    parent { url }
                  }
                }
              }
            }`;

            try {
                const headers = { 'Content-Type': 'application/json' };
                if (token) headers['Authorization'] = `token ${token}`;
                const res = await fetch('https://api.github.com/graphql', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ query })
                });
                const responseData = await res.json();
                if (!responseData.data) {
                    console.log("Unable to fetch issues, token may be required for private repository");
                    return;
                }
                const issues = responseData.data.repository.issues.nodes;
                
                const selector = document.getElementById('issueSelector');
                selector.innerHTML = '<option value="new">-- Create New Use Case --</option>';

                // Build a Map of Parent -> Children
                const issueMap = new Map();
                const topLevel = [];

                issues.forEach(issue => {
                    if (!issue.parent) {
                        topLevel.push(issue);
                    } else {
                        if (!issueMap.has(issue.parent.url)) issueMap.set(issue.parent.url, []);
                        issueMap.get(issue.parent.url).push(issue);
                    }
                });

                // Recursive function to add options with hyphens
                const addHierarchy = (issue, depth = 0) => {
                    const opt = document.createElement('option');
                    opt.value = issue.url;
                    const prefix = "-".repeat(depth) + (depth > 0 ? " " : "");
                    opt.textContent = prefix + issue.title.replace('Use Case: ', '').trim();
                    selector.appendChild(opt);

                    const children = issueMap.get(issue.url) || [];
                    children.forEach(child => addHierarchy(child, depth + 1));
                };

                topLevel.forEach(parent => addHierarchy(parent, 0));

                // Session Sync
                if (currentIssueUrl && currentIssueUrl !== "new") {
                    selector.value = currentIssueUrl;
                    if (selector.value === currentIssueUrl) {
                        document.getElementById('saveStatus').innerText = "Linked to GitHub";
                    } else {
                        currentIssueUrl = "new";
                    }
                }
            } catch(e) { console.error("Hierarchy Fetch Failed", e); }
        }

        async function handleSelectionChange() {
            const selector = document.getElementById('issueSelector');
            const nextVal = selector.value;
            const hasUnsaved = JSON.stringify(state) !== lastSyncedState;

            if (hasUnsaved && lastSyncedState !== "") {
                const choice = confirm("Unsaved changes detected. Publish now?");
                if (choice) await executePublish(currentIssueUrl !== 'new');
            }

            if (nextVal === 'new') {
                if(confirm("Start new use case? Clear form?")) {
                    resetForm();
                    currentIssueUrl = 'new';
                    saveToLocal();
                } else {
                    selector.value = currentIssueUrl;
                }
            } else {
                if (confirm(`Fetch this use case from GitHub?`)) {
                    await fetchSpecificIssue(nextVal);
                    currentIssueUrl = nextVal;
                    saveToLocal();
                } else {
                    selector.value = currentIssueUrl;
                }
            }
        }

        async function fetchSpecificIssue(url) {
            const token = document.getElementById('ghToken').value;
            const id = url.split('/').pop();
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/issues/${id}`, {
                    headers: token ? {'Authorization': `token ${token}`} : {}
                });
                const data = await res.json();
                parseMarkdownToState(data.title, data.body);
                lastSyncedState = JSON.stringify(state);
                renderAll();
                saveToLocal();
                switchTab('edit');
                document.getElementById('saveStatus').innerText = "Synced";
            } catch (e) { alert("Fetch failed"); }
        }

        async function handlePublishClick() {
            await executePublish(currentIssueUrl !== 'new');
            await fetchIssues(); 
        }

        async function executePublish(isUpdate) {
            const token = document.getElementById('ghToken').value;
            if(!token) return alert("PAT Required");
            const apiUrl = isUpdate ? `https://api.github.com/repos/${REPO}/issues/${currentIssueUrl.split('/').pop()}` : `https://api.github.com/repos/${REPO}/issues`;
            
            try {
                const res = await fetch(apiUrl, {
                    method: isUpdate ? 'PATCH' : 'POST',
                    headers: {'Authorization': `token ${token}`},
                    body: JSON.stringify({ title: "Use Case: " + state.title, body: generateMarkdown() })
                });
                if(res.ok) {
                    const d = await res.json();
                    currentIssueUrl = d.html_url;
                    lastSyncedState = JSON.stringify(state);
                    saveToLocal();
                    document.getElementById('issueSelector').value = currentIssueUrl;
                    alert("Published!");
                }
            } catch (e) { alert("Publish failed"); }
        }

        function resetForm() {
            state = { title: "", intro: "", objectives: "", scenario: "", actors: [{name: "User", desc: ""}], steps: [{actorIdx: 0, action: ""}], concepts: [], dataElements: [], deps: [], outcomes: [], references: [] };
            lastSyncedState = JSON.stringify(state);
            renderAll();
        }

        function updateStateFromDOM() {
            ['title','intro','objectives','scenario'].forEach(f => {
                const el = document.getElementById(`uc_${f}`);
                if(el) state[f] = el.value;
            });
        }

        function saveToLocal() {
            localStorage.setItem('educore_v4_draft', JSON.stringify(state));
            localStorage.setItem('educore_v4_url', currentIssueUrl);
            localStorage.setItem('educore_v4_sync', lastSyncedState);
        }
        
        function loadFromLocal() { 
            const s = localStorage.getItem('educore_v4_draft'); 
            const u = localStorage.getItem('educore_v4_url');
            const sy = localStorage.getItem('educore_v4_sync');
            if(s) {
                state = JSON.parse(s);
                // Convert old string fields to arrays
                if (typeof state.concepts === 'string') state.concepts = state.concepts ? [state.concepts] : [];
                if (typeof state.deps === 'string') state.deps = state.deps ? [state.deps] : [];
                if (typeof state.outcomes === 'string') state.outcomes = state.outcomes ? [state.outcomes] : [];
            }
            if(u) currentIssueUrl = u;
            if(sy) lastSyncedState = sy;
            renderAll(); 
        }

        function renderAll() {
            const sync = (arr, i, f) => `oninput="state.${arr}[${i}].${f}=this.value; saveToLocal();"`;
            document.getElementById('actorsTable').innerHTML = state.actors.map((it, i) => `<tr><td><input type="text" value="${it.name}" class="ghost-input" onblur="state.actors[${i}].name=this.value; renderAll(); saveToLocal();"></td><td><input type="text" value="${it.desc}" class="ghost-input" ${sync('actors',i,'desc')}></td><td><button onclick="state.actors.splice(${i},1);renderAll();saveToLocal();" style="color:#f87171;">×</button></td></tr>`).join('');
            document.getElementById('stepsTable').innerHTML = state.steps.map((it, i) => `<tr><td style="text-align:center; font-weight:900; color:#94a3b8; font-size:10px;">${i+1}</td><td><select onchange="state.steps[${i}].actorIdx=this.value; saveToLocal();" class="ghost-input">${state.actors.map((a,ai)=>`<option value="${ai}" ${it.actorIdx==ai?'selected':''}>${a.name||'Actor'}</option>`).join('')}</select></td><td><input type="text" value="${it.action}" class="ghost-input" ${sync('steps',i,'action')}></td><td style="display:flex; gap:4px; justify-content:center; padding: 4px;"><button onclick="moveStep(${i}, -1)" class="control-btn" style="color:#3b82f6;">↑</button><button onclick="moveStep(${i}, 1)" class="control-btn" style="color:#3b82f6;">↓</button><button onclick="state.steps.splice(${i},1);renderAll();saveToLocal();" class="control-btn" style="color:#f87171;">×</button></td></tr>`).join('');
            document.getElementById('dataTable').innerHTML = (state.dataElements || []).map((it, i) => `<tr><td><input type="text" value="${it.name}" class="ghost-input" ${sync('dataElements',i,'name')}></td><td><input type="text" value="${it.def}" class="ghost-input" ${sync('dataElements',i,'def')}></td><td><input type="text" value="${it.url}" class="ghost-input" ${sync('dataElements',i,'url')}></td><td><button onclick="state.dataElements.splice(${i},1);renderAll();saveToLocal();" style="color:#f87171;">×</button></td></tr>`).join('');
            document.getElementById('refsTable').innerHTML = (state.references || []).map((it, i) => `<tr><td><input type="text" value="${it.title}" class="ghost-input" ${sync('references',i,'title')}></td><td><input type="text" value="${it.url}" class="ghost-input" ${sync('references',i,'url')}></td><td><button onclick="state.references.splice(${i},1);renderAll();saveToLocal();" style="color:#f87171;">×</button></td></tr>`).join('');
            document.getElementById('conceptsTable').innerHTML = state.concepts.map((it, i) => `<tr><td><input type="text" value="${it}" class="ghost-input" oninput="state.concepts[${i}]=this.value; saveToLocal();"></td><td><button onclick="state.concepts.splice(${i},1);renderAll();saveToLocal();" style="color:#f87171;">×</button></td></tr>`).join('');
            document.getElementById('depsTable').innerHTML = state.deps.map((it, i) => `<tr><td><input type="text" value="${it}" class="ghost-input" oninput="state.deps[${i}]=this.value; saveToLocal();"></td><td><button onclick="state.deps.splice(${i},1);renderAll();saveToLocal();" style="color:#f87171;">×</button></td></tr>`).join('');
            document.getElementById('outcomesTable').innerHTML = state.outcomes.map((it, i) => `<tr><td><input type="text" value="${it}" class="ghost-input" oninput="state.outcomes[${i}]=this.value; saveToLocal();"></td><td><button onclick="state.outcomes.splice(${i},1);renderAll();saveToLocal();" style="color:#f87171;">×</button></td></tr>`).join('');
            ['title','intro','objectives','scenario'].forEach(f => { const el = document.getElementById(`uc_${f}`); if(el) el.value = state[f] || ""; });
        }

        function moveStep(i, d) { const n = i+d; if(n>=0 && n<state.steps.length) { [state.steps[i], state.steps[n]] = [state.steps[n], state.steps[i]]; renderAll(); saveToLocal(); } }
        function addActor() { state.actors.push({name:"", desc:""}); renderAll(); saveToLocal(); }
        function addStep() { state.steps.push({actorIdx:0, action:""}); renderAll(); saveToLocal(); }
        function addDataElement() { state.dataElements.push({name:"", def:"", url:""}); renderAll(); saveToLocal(); }
        function addReference() { state.references.push({title:"", url:""}); renderAll(); saveToLocal(); }
        function addConcept() { state.concepts.push(""); renderAll(); saveToLocal(); }
        function addDep() { state.deps.push(""); renderAll(); saveToLocal(); }
        function addOutcome() { state.outcomes.push(""); renderAll(); saveToLocal(); }

        function generateMarkdown() {
            const s = state;
            const swim = `### **6. Interaction Swimlane**\n\n<table class="swimlane-table"><thead><tr><th>#</th>${s.actors.map(a=>`<th>${a.name}</th>`).join('')}</tr></thead><tbody>` + s.steps.map((st, i) => `<tr><td>${i+1}</td>${s.actors.map((_, ai) => `<td>${ai == st.actorIdx ? st.action : ""}</td>`).join('')}</tr>`).join('') + '</tbody></table>';
            return [ `## **Use Case: ${s.title}**`, `### **1. Introduction**\n${s.intro}`, `### **2. Objectives**\n${s.objectives}`, `### **3. Scenario**\n${s.scenario}`, `### **4. Actors**\n| Actor | Role |\n| :--- | :--- |\n${s.actors.map(a=>`| **${a.name}** | ${a.desc} |`).join('\n')}`, `### **5. Steps**\n| # | Actor | Action |\n| :--- | :--- | :--- |\n${s.steps.map((st, i)=>`| ${i+1} | ${s.actors[st.actorIdx]?.name} | ${st.action} |`).join('\n')}`, swim, `### **7. Key Concepts**\n${s.concepts.map(c=>`* ${c}`).join('\n')}`, `### **8. Data**\n| Name | Def | URL |\n| :--- | :--- | :--- |\n${s.dataElements.map(d=>`| ${d.name} | ${d.def} | ${d.url} |`).join('\n')}`, `### **9. Dependencies**\n${s.deps.map(d=>`* ${d}`).join('\n')}`, `### **10. Outcomes**\n${s.outcomes.map(o=>`* ${o}`).join('\n')}`, `### **11. References**\n${s.references.map(r=>`* [${r.title}](${r.url})`).join('\n')}` ].join('\n\n---\n\n');
        }

        function parseMarkdownToState(title, body) {
            state.title = title.replace("Use Case: ", "").trim();
            const parts = body.split(/\n---\n/);
            const find = (n) => parts.find(p => p.includes(`### **${n}.`)) || "";
            const clean = (t) => t.replace(/### \*\*\d+\. .*?\*\*/, "").trim();
            state.intro = clean(find(1)); state.objectives = clean(find(2)); state.scenario = clean(find(3));
            const pTable = (c) => c.split('\n').filter(r => r.includes('|') && !r.includes(':---') && !r.includes('| Actor |') && !r.includes('| # |') && !r.includes('| Name |')).map(r => r.split('|').map(x=>x.trim()).filter(x=>x!==""));
            const aRows = pTable(find(4)); state.actors = aRows.map(r => ({name: r[0].replace(/\*\*/g,""), desc: r[1]}));
            const sRows = pTable(find(5)); state.steps = sRows.map(r => ({actorIdx: Math.max(0, state.actors.findIndex(a=>a.name===r[1])), action: r[2]}));
            const dRows = pTable(find(8)); state.dataElements = dRows.map(r => ({name: r[0], def: r[1], url: r[2]}));
            const refSection = clean(find(11));
            state.references = refSection.split('\n').filter(line => line.startsWith('* ')).map(line => {
                const match = line.match(/\* \[([^\]]+)\]\(([^)]+)\)/);
                return match ? {title: match[1], url: match[2]} : {title: '', url: ''};
            });
            const parseList = (section) => section.split('\n').filter(line => line.trim()).map(line => line.startsWith('* ') ? line.substring(2) : line);
            state.concepts = parseList(clean(find(7)));
            state.deps = parseList(clean(find(9)));
            state.outcomes = parseList(clean(find(10)));
        }

        function switchTab(t) {
            const isE = t === 'edit';
            document.getElementById('view-edit').classList.toggle('hidden', !isE);
            document.getElementById('view-preview').classList.toggle('hidden', isE);
            document.getElementById('tab-edit').style.borderBottomColor = isE ? '#2563eb' : 'transparent';
            document.getElementById('tab-preview').style.borderBottomColor = !isE ? '#2563eb' : 'transparent';
            if(!isE) {
                updateStateFromDOM();
                document.getElementById('preview-content').innerHTML = marked.parse(generateMarkdown());
            }
        }
    </script>
</body>
</html>
